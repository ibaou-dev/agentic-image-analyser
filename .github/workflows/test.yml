name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=agentic_vision --cov-report=term-missing

  skill-lint:
    name: Validate SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md has required frontmatter
        run: |
          python3 - <<'EOF'
          import sys
          content = open("skills/agentic-vision/SKILL.md").read()
          if not content.startswith("---"):
              sys.exit("SKILL.md missing YAML frontmatter")
          fm_end = content.index("---", 3)
          fm = content[3:fm_end]
          for field in ("name:", "description:"):
              if field not in fm:
                  sys.exit(f"SKILL.md frontmatter missing {field}")
          print("SKILL.md frontmatter OK")
          EOF
